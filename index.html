<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>청라에너지 지역냉난방 업무길라잡이</title>
  <style>
    :root {
      --ink: #172026;
      --muted: #62717d;
      --line: #d8e1e7;
      --soft: #f3f7fb;
      --paper: #ffffff;
      --brand: #0072bc;
      --brand-2: #00a6c8;
      --accent: #f36f21;
      --danger: #b54708;
      --shadow: 0 14px 36px rgba(23, 32, 38, 0.09);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: #fbfcfd;
      color: var(--ink);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", Arial, sans-serif;
      line-height: 1.55;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(12px);
    }

    .topbar-inner,
    .hero-inner,
    main {
      max-width: 1180px;
      margin: 0 auto;
    }

    .topbar-inner {
      min-height: 62px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      border: 0;
      padding: 0;
      background: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      color: #004f8f;
      font-weight: 800;
      text-align: left;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 9px;
      display: block;
      object-fit: contain;
      background: white;
      flex: 0 0 auto;
    }

    .brand-name {
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .brand:hover .brand-name,
    .brand:focus-visible .brand-name {
      color: var(--brand);
    }

    .brand:focus-visible {
      outline: 3px solid rgba(0, 114, 188, 0.22);
      outline-offset: 4px;
      border-radius: 8px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .button,
    .icon-button,
    .quick-button,
    .category-tab {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      transition: border-color 0.16s ease, background 0.16s ease, color 0.16s ease;
    }

    .button {
      padding: 0 14px;
      font-weight: 750;
      white-space: nowrap;
    }

    .icon-button {
      width: 40px;
      display: grid;
      place-items: center;
    }

    .category-fab {
      min-height: 52px;
      border: 1px solid rgba(0, 114, 188, 0.24);
      border-radius: 8px;
      padding: 0 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--paper);
      color: #004f8f;
      font-weight: 800;
      white-space: nowrap;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .category-fab:hover,
    .category-fab.active {
      border-color: var(--brand);
      background: #f4f9fd;
      transform: translateY(-1px);
    }

    .button:hover,
    .icon-button:hover,
    .quick-button:hover,
    .category-tab:hover {
      border-color: var(--brand);
      color: #004f8f;
      background: #f4f9fd;
    }

    .hero {
      background:
        linear-gradient(110deg, rgba(7, 31, 52, 0.96), rgba(0, 114, 188, 0.9)),
        linear-gradient(45deg, rgba(243, 111, 33, 0.16), transparent);
      color: white;
    }

    .hero-inner {
      padding: 48px 20px 76px;
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(280px, 0.85fr);
      gap: 30px;
      align-items: end;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .hero p {
      margin: 0;
      max-width: 720px;
      color: rgba(255, 255, 255, 0.88);
      font-size: 1.05rem;
    }

    .home-card {
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-radius: 8px;
      padding: 16px;
      background: rgba(255, 255, 255, 0.1);
    }

    .home-card strong {
      display: block;
      margin-bottom: 6px;
    }

    .home-card span,
    .chatbot-note {
      display: block;
      color: rgba(255, 255, 255, 0.82);
      font-size: 0.94rem;
      margin-bottom: 16px;
    }

    .chatbot-note {
      margin: 12px 0 14px;
      padding: 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.9);
    }

    .chatbot-note strong {
      display: block;
      margin-bottom: 4px;
      color: white;
    }

    .home-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .home-link {
      min-height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 8px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: white;
      background: rgba(255, 255, 255, 0.12);
      text-decoration: none;
      font-weight: 800;
      white-space: nowrap;
    }

    .home-link.primary {
      background: rgba(255, 255, 255, 0.18);
    }

    .home-link.secondary {
      background: rgba(243, 111, 33, 0.88);
      border-color: rgba(243, 111, 33, 0.95);
    }

    .home-link:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .home-link.secondary:hover {
      background: #f36f21;
    }

    main {
      padding: 0 20px 56px;
    }

    .search-panel {
      margin-top: -46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--paper);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .search-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 10px;
      align-items: stretch;
    }

    .search-wrap {
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    #searchInput {
      width: 100%;
      min-height: 52px;
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
      padding: 0 46px;
      background: var(--soft);
      color: var(--ink);
    }

    #searchInput:focus {
      border-color: var(--brand);
      background: white;
      box-shadow: 0 0 0 4px rgba(0, 114, 188, 0.13);
    }

    .clear-button {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 1.2rem;
    }

    .quick-searches {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .quick-button {
      min-height: 26px;
      border-radius: 999px;
      padding: 3px 9px;
      display: inline-flex;
      align-items: center;
      background: white;
      border: 1px solid var(--line);
      color: #42505a;
      font-size: 0.86rem;
      font-weight: 700;
    }

    .quick-button:hover {
      border-color: var(--brand);
      color: #004f8f;
      background: #f7fbff;
    }

    .layout {
      margin-top: 24px;
    }

    .sidebar {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      z-index: 45;
      width: min(340px, calc(100vw - 36px));
      border: 1px solid var(--line);
      border-left: 0;
      border-radius: 0 8px 8px 0;
      overflow: hidden;
      background: var(--paper);
      box-shadow: var(--shadow);
      transform: translateX(-105%);
      transition: transform 0.2s ease;
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-backdrop {
      position: fixed;
      inset: 0;
      z-index: 40;
      border: 0;
      display: none;
      background: rgba(23, 32, 38, 0.32);
    }

    .sidebar-backdrop.open {
      display: block;
    }

    .sidebar-head,
    .section-head {
      border-bottom: 1px solid var(--line);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .sidebar-head {
      min-height: 72px;
      padding-left: 20px;
    }

    .sidebar-close {
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 999px;
      display: grid;
      place-items: center;
      background: var(--paper);
      color: var(--muted);
    }

    h2 {
      margin: 0;
      font-size: 1.05rem;
      letter-spacing: 0;
    }

    .section-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .count-badge {
      min-width: 34px;
      height: 28px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      padding: 0 8px;
      background: var(--brand);
      color: white;
      font-weight: 800;
      font-size: 0.9rem;
    }

    .category-list {
      display: grid;
      gap: 6px;
      padding: 8px;
      max-height: calc(100vh - 74px);
      overflow: auto;
    }

    .category-tab {
      padding: 11px 12px;
      text-align: left;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      background: transparent;
    }

    .category-tab.active {
      border-color: rgba(0, 114, 188, 0.32);
      background: rgba(0, 114, 188, 0.08);
      color: #004f8f;
      font-weight: 800;
    }

    .content {
      min-width: 0;
    }

    .section {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--paper);
      margin-bottom: 18px;
    }

    .result-list {
      display: grid;
    }

    .result-item {
      border: 0;
      border-bottom: 1px solid var(--line);
      background: transparent;
      text-align: left;
    }

    .result-question {
      width: 100%;
      border: 0;
      padding: 15px 18px;
      background: transparent;
      text-align: left;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .result-item:last-child {
      border-bottom: 0;
    }

    .result-question:hover,
    .result-question[aria-expanded="true"] {
      background: #fbfcfd;
    }

    .result-title {
      color: var(--ink);
      font-size: 0.98rem;
      font-weight: 650;
      line-height: 1.55;
    }

    .result-chevron {
      color: var(--muted);
      transition: transform 0.16s ease;
    }

    .result-question[aria-expanded="true"] .result-chevron {
      transform: rotate(180deg);
    }

    .result-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 5px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 0 7px;
      background: #f3f6f8;
      color: #65727c;
      border: 1px solid #e7edf1;
      font-weight: 600;
    }

    .answer-label {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      padding: 0 10px;
      background: rgba(230, 162, 60, 0.18);
      color: #9b430c;
      font-weight: 800;
      font-size: 0.9rem;
    }

    .answer-body {
      display: none;
      padding: 0 18px 22px;
      color: #2b3339;
    }

    .result-item.open .answer-body {
      display: block;
    }

    .answer-inner {
      position: relative;
      border: 1px solid #e7edf1;
      border-left: 3px solid rgba(0, 114, 188, 0.36);
      border-radius: 8px;
      padding: 20px 22px;
      background: #fff;
      box-shadow: none;
    }

    .answer-kicker {
      margin: 0 0 14px;
      display: inline-flex;
      align-items: center;
      color: #004f8f;
      font-size: 0.9rem;
      font-weight: 700;
    }

    .answer-content {
      display: grid;
      gap: 0;
    }

    .answer-body p {
      margin: 0;
      padding: 6px 0;
      line-height: 1.82;
      font-size: 0.98rem;
      color: #25313a;
    }

    .answer-body p:last-child {
      padding-bottom: 0;
    }

    .answer-body p.answer-section-line {
      padding-top: 14px;
      color: #16232d;
      font-weight: 650;
    }

    .answer-body p.answer-section-line:first-child {
      padding-top: 4px;
    }

    .answer-keywords {
      margin-top: 34px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
    }

    .answer-keywords summary {
      width: fit-content;
      cursor: pointer;
      list-style: none;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 650;
    }

    .answer-keywords summary::-webkit-details-marker {
      display: none;
    }

    .answer-keywords summary::after {
      content: " 보기";
      color: #7d8a93;
      font-weight: 500;
    }

    .answer-keywords[open] summary {
      margin-bottom: 10px;
    }

    .answer-keyword-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .keyword-chip {
      min-height: 24px;
      border-radius: 999px;
      padding: 2px 8px;
      display: inline-flex;
      align-items: center;
      background: #f7f9fa;
      border: 1px solid #edf1f4;
      color: #63717b;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .answer-tools {
      margin-top: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .empty,
    .loading {
      padding: 28px 18px;
      text-align: center;
      color: var(--muted);
    }

    .source-note {
      margin-top: 24px;
      padding: 16px 0;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 880px) {
      .hero-inner {
        grid-template-columns: 1fr;
        padding-top: 38px;
      }

    }

    @media (max-width: 560px) {
      .topbar-inner,
      .hero-inner,
      main {
        padding-left: 14px;
        padding-right: 14px;
      }

      .category-fab {
        width: 52px;
        padding: 0;
      }

      .category-fab span {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
      }

      .section-head {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <header class="topbar" id="top">
    <div class="topbar-inner">
      <button class="brand" type="button" id="brandHome" aria-label="처음으로 이동">
        <img class="brand-mark" src="assets/cheongna-energy-logo.jpg" alt="">
        <span class="brand-name">청라에너지 업무길라잡이</span>
      </button>
      <div class="top-actions">
        <button class="button" type="button" id="downloadTop">전체 다운로드</button>
        <button class="icon-button" type="button" id="toTop" aria-label="맨 위로 이동" title="맨 위로 이동">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none">
            <path d="m6 15 6-6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <div>
        <h1>키워드로 바로 찾기</h1>
        <p><b>요금</b> · <b>납부</b> · <b>감면</b> · <b>명의변경</b>처럼 필요한 단어만 입력하세요.</p>
      </div>
      <div class="home-card">
        <strong>청라에너지 홈페이지</strong>
        <span>열요금 조회, 자료 신청, 상담 연결은 홈페이지와 AI 챗봇에서 확인할 수 있습니다.</span>
        <div class="home-actions">
          <a class="home-link secondary" href="http://www.e-cheongna.co.kr" target="_blank" rel="noopener">
            홈페이지 / AI 챗봇 열기
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M7 17 17 7M9 7h8v8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
      </div>
    </div>
  </section>

  <main>
    <section class="search-panel" aria-label="FAQ 검색">
      <div class="search-row">
        <button class="category-fab" type="button" id="categoryToggle" aria-label="카테고리 열기" title="카테고리" aria-expanded="false" aria-controls="categorySidebar">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M8 6h12M8 12h12M8 18h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M4 6h.01M4 12h.01M4 18h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
          </svg>
          <span>카테고리</span>
        </button>
        <div class="search-wrap">
          <svg width="21" height="21" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="m21 21-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
          </svg>
          <input id="searchInput" type="search" autocomplete="off" placeholder="예: 에너지바우처, 자동이체, 기본요금, 명의변경">
          <button class="clear-button" type="button" id="clearSearch" aria-label="검색어 지우기" title="검색어 지우기">×</button>
        </div>
      </div>
      <div class="quick-searches" id="quickSearches" aria-label="추천 검색어"></div>
    </section>

    <button class="sidebar-backdrop" type="button" id="sidebarBackdrop" aria-label="카테고리 닫기"></button>

    <div class="layout">
      <aside class="sidebar" id="categorySidebar" aria-label="카테고리 목차" aria-hidden="true">
        <div class="sidebar-head">
          <h2>카테고리</h2>
          <div class="top-actions">
            <span class="count-badge" id="totalCount">0</span>
            <button class="sidebar-close" type="button" id="categoryClose" aria-label="카테고리 닫기" title="닫기">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="m6 6 12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="category-list" id="categoryList"></div>
      </aside>

      <div class="content">
        <section class="section" aria-live="polite">
          <div class="section-head">
            <div>
              <h2 id="resultHeading">전체 질문</h2>
              <p id="resultSummary">시트 데이터를 불러오는 중입니다.</p>
            </div>
            <button class="button" type="button" id="resetView">처음으로</button>
          </div>
          <div class="result-list" id="resultList">
            <div class="loading">데이터를 불러오고 있습니다.</div>
          </div>
        </section>

      </div>
    </div>
  </main>

  <script>
    const embeddedFaqs = [
          {

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let inQuotes = false;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];

        if (char === '"' && inQuotes && next === '"') {
          cell += '"';
          i += 1;
        } else if (char === '"') {
          inQuotes = !inQuotes;
        } else if (char === "," && !inQuotes) {
          row.push(cell);
          cell = "";
        } else if ((char === "\n" || char === "\r") && !inQuotes) {
          if (char === "\r" && next === "\n") i += 1;
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        } else {
          cell += char;
        }
      }

      if (cell || row.length) {
        row.push(cell);
        rows.push(row);
      }

      return rows;
    }

    function stripQuestionNumber(question) {
      return question.replace(/^\s*\d+\.\s*/, "").trim();

    function keywordList(value) {

        .map(item => item.trim())

    function inferCategory(question, keywords) {
      const text = `${question} ${keywords.join(" ")}`;
      const rules = [
        ["복지·감면", /에너지바우처|감면|할인|취약|복지|임대주택|차상위|수급자/],

        ["명의·정보변경", /명의|대표자|세금계산서|사업자|정보변경|법인명/],
        ["설비·검침", /검침|열량계|계량기|기계실|밸브|공급온도|열교환|부정사용|공동난방|열손실/],
        ["세대 난방", /난방비절약|온도조절기|1층|방밸브|세대난방|실내온도|단열|난방사용량/],
        ["요금", /열요금|기본요금|사용요금|단가|요금제|급탕|오피스텔|Mcal|세대분배|수도료/],

      ];
      const match = rules.find(([, regex]) => regex.test(text));
      return match ? match[0] : "기타";
    }

    function rowsToFaqs(rows) {
      const header = rows[0] || [];
      const qIndex = header.findIndex(cell => /질문|질문목록/.test(cell));
      const aIndex = header.findIndex(cell => /답변/.test(cell));
      const kIndex = header.findIndex(cell => /키워드/.test(cell));

      return rows.slice(1)
        .map(row => {
          const questionRaw = row[qIndex >= 0 ? qIndex : 0] || "";
          const answer = row[aIndex >= 0 ? aIndex : 1] || "";
          const keywords = keywordList(row[kIndex >= 0 ? kIndex : 2] || "");
          const question = stripQuestionNumber(questionRaw);
          return {
            category: inferCategory(question, keywords),
            question,
            answer: String(answer).replace(/^\u261e\s*/, "").trim(),
            keywords
          };
        })
        .filter(item => item.question && item.answer && item.question !== "질문목록");
    }

    function normalize(text) {
      return String(text || "").toLowerCase().replace(/\s+/g, "");
    }

    function scoreItem(item, query) {
      if (!query) return 1;
      const q = normalize(query);
      const question = normalize(item.question);
      const category = normalize(item.category);
      const keywords = normalize(item.keywords.join(" "));
      const answer = normalize(item.answer);
      let score = 0;
      if (question.includes(q)) score += 8;
      if (keywords.includes(q)) score += 6;
      if (category.includes(q)) score += 4;
      if (answer.includes(q)) score += 2;
      q.split("").forEach(char => {
        if (question.includes(char) || keywords.includes(char)) score += 0.2;
      });
      return score;
    }

    function getFilteredFaqs() {
      const query = state.query.trim();
      return faqs
        .map((item, index) => ({ ...item, index, score: scoreItem(item, query) }))
        .filter(item => state.category === "전체" || item.category === state.category)
        .filter(item => !query || item.score >= Math.max(1.4, query.length * 0.35))
        .sort((a, b) => query ? b.score - a.score || a.index - b.index : a.index - b.index);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function answerParagraphs(answer) {
      const rawLines = String(answer || "")
        .split(/\n+/)
        .map(line => line.replace(/\u261e/g, "").replace(/\s+/g, " ").trim())
        .filter(Boolean);

      return rawLines.flatMap(line => {
        const isListLine = /^([-*]|[0-9]+\)|[①②③④⑤⑥⑦⑧⑨⑩]|[ㅇ❍※]|\[)/.test(line);
        if (isListLine) return [line];

        return line
          .split(/(?<=[.!?。]|다\.|요\.|니다\.)\s+/)
          .map(sentence => sentence.trim())
          .filter(Boolean);
      });
    }

        "",
        ...faqs.flatMap((item, index) => [
          `${index + 1}. [${item.category}] ${item.question}`,
          item.answer,
          `키워드: ${item.keywords.join(", ")}`,
          ""
        ])
      ].join("\n");
      const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "cheongna-energy-faq.txt";
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    quickSearches.addEventListener("click", event => {
      const button = event.target.closest("button[data-term]");
      if (!button) return;
      state.query = button.dataset.term;
      state.category = "전체";
      state.expandedIndex = null;
      searchInput.value = state.query;
      renderCategories();
      renderResults();
      resultList.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    categoryList.addEventListener("click", event => {
      const button = event.target.closest("button[data-category]");
      if (!button) return;
      state.category = button.dataset.category;
      state.expandedIndex = null;
      renderCategories();
      renderResults();
      closeCategorySidebar();
    });

    resultList.addEventListener("click", async event => {
      const button = event.target.closest("button[data-index]");
      const copyButton = event.target.closest("button[data-copy-index]");

      if (copyButton) {
        const item = faqs[Number(copyButton.dataset.copyIndex)];
        const text = `${item.question}\n\n${item.answer}`;
        await navigator.clipboard.writeText(text);
        copyButton.textContent = "복사 완료";
        setTimeout(() => { copyButton.textContent = "답변 복사"; }, 1300);
        return;
      }

      if (!button) return;
      const index = Number(button.dataset.index);
      state.expandedIndex = state.expandedIndex === index ? null : index;
      renderResults();
    });

    searchInput.addEventListener("input", event => {
      state.query = event.target.value;
      state.category = "전체";
      state.expandedIndex = null;
      renderCategories();
      renderResults();
    });

    document.querySelector("#clearSearch").addEventListener("click", () => {
      state.query = "";
      state.expandedIndex = null;
      searchInput.value = "";
      searchInput.focus();
      renderResults();
    });

    document.querySelector("#brandHome").addEventListener("click", resetAll);
    document.querySelector("#resetView").addEventListener("click", resetAll);
    categoryToggle.addEventListener("click", toggleCategorySidebar);
    categoryClose.addEventListener("click", closeCategorySidebar);
    sidebarBackdrop.addEventListener("click", closeCategorySidebar);
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeCategorySidebar();
    });
    document.querySelector("#toTop").addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
    document.querySelector("#downloadTop").addEventListener("click", downloadManual);

    async function init() {
      await loadSheetData();
      refreshDerivedData();
      renderQuickSearches();
      renderCategories();
      renderResults();
    }

    init();
  </script>
</body>
</html>
